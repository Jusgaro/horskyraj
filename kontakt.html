<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>
    <!-- SEO a meta tagy odstránené pre simuláciu stavu PRED -->
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    
    <!-- Simulácia neminifikovaného a pomalého CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Critical CSS odstránené - biela stránka počas načítavania */
    </style>
</head>
<body>
    <header class="header">
        <nav class="navbar"> <!-- aria-label odstránený -->
            <div class="logo">
                <a href="index.html">Horský Raj</a>
            </div>
            <div class="hamburger" id="hamburger"> <!-- aria-label a role odstránené -->
                <span></span><span></span><span></span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Domov</a></li>
                <li><a href="o-nas.html">O nás</a></li>
                <li><a href="sluzby.html">Služby</a></li>
                <li><a href="fotogaleria.html">Fotogaléria</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
            </ul>
        </nav>
    </header>

    <section class="page-hero page-hero-small">
        <!-- Odstránené width/height (spôsobí Layout Shift) a ALT text -->
        <img src="https://images.unsplash.com/photo-1445363692815-ebcd1d512b44?w=1920" alt="">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <!-- H1 nahradené netechnickým elementom -->
            <span style="display:block; font-size: 2.5rem; font-weight: bold; font-family: 'Playfair Display';">Kontakt</span>
        </div>
    </section>

    <main>
        <section class="section">
            <div class="container">
                <p class="section-intro">Máte otázky? Napíšte nám alebo zavolajte.</p>

                <div class="contact-grid">
                    <div class="contact-form-wrapper">
                        <h2>Napíšte nám</h2>
                        <div class="contact-form" id="contactForm">
                            <div class="form-group">
                                <!-- Odstránené Label prepojenie - chyba prístupnosti -->
                                <p>Meno a priezvisko</p>
                                <input type="text" id="formName" name="name">
                            </div>
                            <div class="form-group">
                                <p>E-mailová adresa</p>
                                <input type="email" id="formEmail" name="email">
                            </div>
                            <div class="form-group">
                                <p>Vaša správa</p>
                                <textarea id="formMessage" name="message" rows="5"></textarea>
                            </div>
                            <button type="button" class="btn-cta">Odoslať</button>
                        </div>
                    </div>

                    <div class="contact-info-wrapper">
                        <h2>Kontaktné údaje</h2>
                        <p>Tatranská 42, Vysoké Tatry</p>
                        <p>Telefón: +421 900 123 456</p>
                    </div>
                </div>

                <div class="map-section">
                    <h2>Kde nás nájdete</h2>
                    <div class="map-wrapper">
                        <!-- Odstránené loading="lazy" a title - mapa bude brzdiť načítanie -->
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d83456.89!2d20.2!3d49.14!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x473e39e1e28cddd7%3A0x400f7d1c6978e30!2zVnlzb2vDqSBUYXRyeQ!5e0!3m2!1ssk!2ssk!4v1700000000000!5m2!1ssk!2ssk"
                            width="100%"
                            height="450"
                            style="border:0;">
                        </iframe>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Horský Raj</p>
        </div>
    </footer>

    <!-- Neminifikovaný JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
